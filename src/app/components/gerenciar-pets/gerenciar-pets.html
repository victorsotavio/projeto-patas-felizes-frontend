@if (carregando) {
  <div class="alert alert-info mx-3 mt-3">
    Carregando animais...
  </div>
}

@if (mensagemSucesso) {
  <div class="alert alert-success mx-3 mt-3">
    {{ mensagemSucesso }}
  </div>
}

@if (mensagemErro) {
  <div class="alert alert-danger mx-3 mt-3">
    {{ mensagemErro }}
  </div>
}

<app-crudgenerico
  tituloFuncionalidade="Gerenciar animais"
  [colunas]="colunasPet"
  [dados]="listaDePets"
  [templateEditar]="btnEditarTabela"
  [templateDeletar]="btnDeletarTabela"
>

  <div acoes-topo>

    <app-modalgenerico
      titulo="Cadastrar animal"
      textoBotaoAbrir="Novo animal"
      classeBotaoAbrir="btn-success btn-sm"
      textoSalvar="Cadastrar"
      (aoSalvar)="cadastrar()"
    >

      <div class="mb-3">
        <label
          for="nomeAnimalCadastrar"
          class="form-label"
        >
          Nome
        </label>

        <input
          id="nomeAnimalCadastrar"
          type="text"
          class="form-control"
          [(ngModel)]="petCadastrar.nome"
        >
      </div>

      <div class="mb-3">
        <label
          for="donoAnimalCadastrar"
          class="form-label"
        >
          Dono
        </label>

        <select
          id="donoAnimalCadastrar"
          class="form-select"
          [(ngModel)]="petCadastrar.idPessoaDono"
        >
          <option
            [ngValue]="0"
            disabled
          >
            Selecione o dono
          </option>

          @for (
            cliente of listaDeClientes;
            track cliente.id
          ) {
            @if (cliente.id !== undefined) {
              <option [ngValue]="cliente.id">
                {{ cliente.nome }}
              </option>
            }
          }
        </select>
      </div>

    </app-modalgenerico>

  </div>

</app-crudgenerico>

<ng-template #btnEditarTabela let-pet>

  <app-modalgenerico
    titulo="Editar animal"
    textoBotaoAbrir="Editar"
    classeBotaoAbrir="btn-outline-primary btn-sm"
    textoSalvar="Salvar"
    (aoAbrir)="prepararEdicao(pet)"
    (aoSalvar)="salvarEdicao()"
  >

    <div class="mb-3">
      <label
        for="nomeAnimalEditar"
        class="form-label"
      >
        Nome
      </label>

      <input
        id="nomeAnimalEditar"
        type="text"
        class="form-control"
        [(ngModel)]="petEditar.nome"
      >
    </div>

    <div class="mb-3">
      <label
        for="donoAnimalEditar"
        class="form-label"
      >
        Dono
      </label>

      <select
        id="donoAnimalEditar"
        class="form-select"
        [(ngModel)]="petEditar.idPessoaDono"
      >
        <option
          [ngValue]="0"
          disabled
        >
          Selecione o dono
        </option>

        @for (
          cliente of listaDeClientes;
          track cliente.id
        ) {
          @if (cliente.id !== undefined) {
            <option [ngValue]="cliente.id">
              {{ cliente.nome }}
            </option>
          }
        }
      </select>
    </div>

  </app-modalgenerico>

</ng-template>

<ng-template #btnDeletarTabela let-pet>

  <app-modalgenerico
    titulo="Confirmar exclusão"
    textoBotaoAbrir="Excluir"
    classeBotaoAbrir="btn-outline-danger btn-sm"
    textoSalvar="Excluir"
    (aoAbrir)="prepararExclusao(pet)"
    (aoSalvar)="deletar()"
  >

    <p class="mb-0">
      Deseja realmente excluir o animal
      <strong>{{ pet.nome }}</strong>?
    </p>

  </app-modalgenerico>

</ng-template>
