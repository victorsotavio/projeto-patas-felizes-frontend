<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
</head>

<body class="corVerdeBackground d-flex align-items-center justify-content-center vh-100 corVerdeBackground">

  <main class="w-100 m-auto" style="max-width: 380px;">
    
    <div class="card shadow-sm">
      <div class="bg-light card-body p-4" > <form>
          <div class="text-center">
            <img class="mb-4" src="https://getbootstrap.com/docs/5.3/assets/brand/bootstrap-logo.svg" alt="Logo" width="72" height="57">
          </div>

          <h1 class="h3 mb-3 fw-normal text-center">Insira seus dados</h1>

          <div class="form-floating mb-2">
            <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com" required>
            <label for="floatingInput">Endereço de Email</label>
          </div>

          <div class="form-floating mb-3">
            <input type="password" class="form-control" id="floatingPassword" placeholder="Senha12345678" required>
            <label for="floatingPassword">Senha</label>
          </div>

          <button class="btn btn-custom-escuro w-100 py-2" type="submit">Entrar</button>
        </form>

      </div>
    </div>
    </main>

</body>
</html>
